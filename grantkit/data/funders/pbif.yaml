# Public Benefit Innovation Fund (PBIF) rule pack
#
# Provenance: derived from the READ-ONLY reference grant at
# ~/grantkit-grants/pbif/grant.yaml plus the filenames in its responses/
# directory (01_executive_summary.md ... 15_financial_viability.md).
#
# IMPORTANT — uncertain fields: the reference grant.yaml has solicitation_url:
# null and defines no per-section word/character limits, so NONE are encoded
# here (they are unknown, not zero/unlimited). The spelling locale and portal
# markdown behaviour could not be sourced and are marked below. Do not treat the
# absence of a limit as "no limit"; confirm against the current PBIF call before
# relying on this pack.
#
# Source grant metadata (from reference grant.yaml):
#   foundation: Public Benefit Innovation Fund
#   program: Summer 2025 Open Call
#   amount_requested: 700000 (the applicant's request, NOT a fund cap)
#   duration_years: 2
#   status: rejected

id: pbif
name: Public Benefit Innovation Fund
program: Summer 2025 Open Call
source_url: null  # Not available in the reference grant; unknown.
locale: en-US  # UNCERTAIN — could not be sourced; assumed US English.
